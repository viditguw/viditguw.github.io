<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VendorShield — Third-Party Risk Console</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0d12;--surface:#111620;--surface2:#161c27;--surface3:#1c2438;
    --border:#1f2d45;--border2:#263550;--text:#c8d8f0;--text-muted:#5a7399;
    --text-dim:#3d5578;--accent:#2d7dd2;--accent-glow:rgba(45,125,210,0.15);
    --accent2:#00c9a7;--high:#ff4d6d;--high-bg:rgba(255,77,109,0.1);
    --medium:#f4a261;--medium-bg:rgba(244,162,97,0.1);--low:#06d6a0;
    --low-bg:rgba(6,214,160,0.1);--mono:'IBM Plex Mono',monospace;
    --sans:'IBM Plex Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(45,125,210,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,125,210,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,13,18,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;}
  .topbar-left{display:flex;align-items:center;gap:20px;}
  .logo{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:10px;}
  .logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .logo-sub{font-family:var(--mono);font-size:11px;color:var(--text-muted);padding-left:20px;border-left:1px solid var(--border2);letter-spacing:0.08em;text-transform:uppercase;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .agent-status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;}
  .agent-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,201,167,0.4);}50%{opacity:0.7;box-shadow:0 0 0 4px rgba(0,201,167,0);}}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;}
  .btn:hover{background:var(--surface3);border-color:var(--accent);color:var(--accent);}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn-primary:hover{background:#2268b8;border-color:#2268b8;color:#fff;}
  .btn-danger{border-color:var(--high);color:var(--high);}
  .btn-danger:hover{background:var(--high-bg);}
  .btn-success{border-color:var(--accent2);color:var(--accent2);}
  .btn-success:hover{background:rgba(6,214,160,0.1);}
  .btn-sm{padding:5px 11px;font-size:12px;}
  .layout{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:28px 32px;}
  .stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
  .stat-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:8px;}
  .stat-value{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--text);line-height:1;}
  .stat-value.accent{color:var(--accent);}.stat-value.green{color:var(--accent2);}.stat-value.red{color:var(--high);}.stat-value.orange{color:var(--medium);}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;}
  .filter-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;}
  .filter-tab{padding:6px 14px;border-radius:5px;border:none;background:transparent;color:var(--text-muted);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;}
  .filter-tab.active{background:var(--surface3);color:var(--text);border:1px solid var(--border2);}
  .filter-tab:hover:not(.active){color:var(--text);}
  .search-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 14px;color:var(--text);font-family:var(--mono);font-size:13px;width:220px;outline:none;transition:border-color 0.15s;}
  .search-box:focus{border-color:var(--accent);}
  .search-box::placeholder{color:var(--text-dim);}
  .issue-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .issue-table-header{display:grid;grid-template-columns:90px 180px 1fr 90px 140px 120px 110px;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
  .th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);font-weight:500;}
  .issue-row{display:grid;grid-template-columns:90px 180px 1fr 90px 140px 120px 110px;padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;align-items:center;}
  .issue-row:last-child{border-bottom:none;}
  .issue-row:hover{background:var(--surface2);}
  .issue-row.selected{background:var(--accent-glow);border-left:3px solid var(--accent);padding-left:17px;}
  .issue-id{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:500;}
  .issue-vendor{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:12px;}
  .issue-desc{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:16px;}
  .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.05em;white-space:nowrap;}
  .badge-high{background:var(--high-bg);color:var(--high);border:1px solid rgba(255,77,109,0.2);}
  .badge-medium{background:var(--medium-bg);color:var(--medium);border:1px solid rgba(244,162,97,0.2);}
  .badge-low{background:var(--low-bg);color:var(--low);border:1px solid rgba(6,214,160,0.2);}
  .badge-open{background:rgba(45,125,210,0.12);color:#2d7dd2;border:1px solid rgba(45,125,210,0.2);}
  .badge-awaiting{background:rgba(155,114,207,0.12);color:#9b72cf;border:1px solid rgba(155,114,207,0.2);}
  .badge-review{background:rgba(244,162,97,0.12);color:var(--medium);border:1px solid rgba(244,162,97,0.2);}
  .badge-closed{background:rgba(6,214,160,0.12);color:var(--accent2);border:1px solid rgba(6,214,160,0.2);}
  .badge-escalated{background:rgba(255,77,109,0.12);color:var(--high);border:1px solid rgba(255,77,109,0.2);}
  .sla-date{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
  .sla-date.overdue{color:var(--high);}
  .row-actions{display:flex;gap:6px;justify-content:flex-end;}
  .detail-panel{display:none;position:fixed;top:56px;right:0;bottom:0;width:520px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;z-index:50;animation:slideIn 0.2s ease;}
  @keyframes slideIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  .detail-panel.open{display:block;}
  .detail-header{padding:20px 24px;border-bottom:1px solid var(--border);background:var(--surface2);position:sticky;top:0;z-index:10;}
  .detail-header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .detail-id{font-family:var(--mono);font-size:12px;color:var(--accent);margin-bottom:4px;}
  .detail-vendor{font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;}
  .detail-control{font-family:var(--mono);font-size:11px;color:var(--text-muted);}
  .detail-badges{display:flex;gap:6px;flex-wrap:wrap;}
  .close-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px;line-height:1;transition:color 0.15s;}
  .close-btn:hover{color:var(--text);}
  .detail-body{padding:20px 24px;}
  .detail-section{margin-bottom:24px;}
  .detail-section-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .detail-field{margin-bottom:10px;}
  .detail-field-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;}
  .detail-field-value{font-size:13px;color:var(--text);line-height:1.5;}
  .detail-field-value.mono{font-family:var(--mono);font-size:12px;}
  .score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .score-item{text-align:center;}
  .score-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:4px;}
  .score-value{font-family:var(--mono);font-size:28px;font-weight:600;line-height:1;margin-bottom:4px;}
  .score-bar{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
  .score-fill{height:100%;border-radius:2px;}
  .audit-trail{display:flex;flex-direction:column;}
  .audit-item{display:flex;gap:12px;padding:10px 0;position:relative;}
  .audit-item::before{content:'';position:absolute;left:15px;top:28px;bottom:-10px;width:1px;background:var(--border);}
  .audit-item:last-child::before{display:none;}
  .audit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;margin-left:12px;border:1px solid;}
  .audit-dot.agent{background:var(--accent);border-color:var(--accent);}
  .audit-dot.analyst{background:var(--accent2);border-color:var(--accent2);}
  .audit-action{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:2px;}
  .audit-meta{font-family:var(--mono);font-size:10px;color:var(--text-dim);}
  .controls-row{display:flex;gap:8px;flex-wrap:wrap;padding:16px 24px;border-top:1px solid var(--border);background:var(--surface2);position:sticky;bottom:0;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:560px;max-height:85vh;overflow-y:auto;animation:modalIn 0.2s ease;}
  @keyframes modalIn{from{transform:scale(0.95) translateY(10px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
  .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-title{font-size:16px;font-weight:600;color:var(--text);}
  .modal-body{padding:24px;}
  .form-group{margin-bottom:18px;}
  .form-label{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:6px;}
  .form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:9px 13px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color 0.15s;}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
  .form-textarea{resize:vertical;min-height:80px;line-height:1.5;}
  .form-select option{background:var(--surface2);}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
  .toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .toast{background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:10px 20px;font-size:13px;color:var(--text);font-family:var(--mono);animation:toastIn 0.2s ease;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
  @keyframes toastIn{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .no-issues{padding:40px;text-align:center;color:var(--text-muted);font-family:var(--mono);font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo"><div class="logo-icon">🛡</div>VendorShield</div>
    <div class="logo-sub">Third-Party Risk Console</div>
  </div>
  <div class="topbar-right">
    <div class="agent-status"><div class="agent-dot"></div>Agent active · next cycle in <span id="countdown">09:42</span></div>
    <button class="btn btn-primary" onclick="openCreateModal()">＋ New Issue</button>
  </div>
</div>

<div class="layout">
  <div class="stats-row" id="stats-row"></div>
  <div class="toolbar">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('All',this)">All</button>
      <button class="filter-tab" onclick="setFilter('Open',this)">Open</button>
      <button class="filter-tab" onclick="setFilter('Awaiting Evidence',this)">Awaiting</button>
      <button class="filter-tab" onclick="setFilter('Under Review',this)">Under Review</button>
      <button class="filter-tab" onclick="setFilter('Escalated',this)">Escalated</button>
      <button class="filter-tab" onclick="setFilter('Closed',this)">Closed</button>
    </div>
    <input class="search-box" type="text" placeholder="Search vendor or issue..." oninput="setSearch(this.value)">
  </div>
  <div class="issue-table">
    <div class="issue-table-header">
      <div class="th">Issue ID</div><div class="th">Vendor</div><div class="th">Description</div>
      <div class="th">Severity</div><div class="th">Status</div><div class="th">SLA Deadline</div>
      <div class="th" style="text-align:right">Actions</div>
    </div>
    <div id="issue-list"></div>
  </div>
</div>

<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div class="detail-header-top">
      <div>
        <div class="detail-id" id="d-id"></div>
        <div class="detail-vendor" id="d-vendor"></div>
        <div class="detail-control" id="d-control"></div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-badges" id="d-badges"></div>
  </div>
  <div class="detail-body" id="detail-body"></div>
  <div class="controls-row" id="detail-controls"></div>
</div>

<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Create New Issue</div><button class="close-btn" onclick="closeCreateModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Vendor Name</label><input class="form-input" id="f-vendor" type="text" placeholder="e.g. Acme Corp"></div>
      <div class="form-group"><label class="form-label">Vendor Security Email</label><input class="form-input" id="f-email" type="email" placeholder="security@vendor.com"></div>
      <div class="form-group"><label class="form-label">Control ID</label><input class="form-input" id="f-control" type="text" placeholder="e.g. IAM-001"></div>
      <div class="form-group"><label class="form-label">Issue Description</label><textarea class="form-textarea" id="f-desc" placeholder="Describe the specific control gap identified..."></textarea></div>
      <div class="form-group"><label class="form-label">Evidence Criteria</label><textarea class="form-textarea" id="f-criteria" placeholder="Describe exactly what evidence the vendor must provide..."></textarea></div>
      <div class="form-group"><label class="form-label">Severity</label><select class="form-select" id="f-severity"><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select></div>
      <div class="form-group"><label class="form-label">SLA Deadline</label><input class="form-input" id="f-sla" type="date"></div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeCreateModal()">Cancel</button><button class="btn btn-primary" onclick="createIssue()">Create Issue</button></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
let issues=[];let activeFilter='All';let searchQuery='';let selectedIssueId=null;

const EMBEDDED=[
  {issue_id:"ISS-001",vendor_name:"Acme Cloud Solutions",vendor_email:"security@acmecloud.com",control_id:"IAM-001",issue_description:"Multi-factor authentication is not enforced on privileged administrator accounts, exposing critical systems to credential-based attacks.",severity:"High",date_opened:"2026-02-10",sla_deadline:"2026-02-24",status:"Escalated",evidence_criteria:"Screenshot of admin account settings panel showing MFA enforced for all accounts with administrative privileges, dated within the last 30 days.",agent_last_action:"Evidence evaluated — confidence too low to auto-close. Escalated to analyst.",agent_decision:"ESCALATE",relevance_score:78,mapping_score:61,sufficiency_score:55,overall_confidence:"LOW",agent_reasoning:"Vendor submitted a policy document stating MFA is required, but did not provide a screenshot or config export demonstrating MFA is actively enforced on admin accounts.",missing:"Screenshot or configuration export showing MFA actively enforced on admin-privileged accounts.",audit_trail:[{timestamp:"2026-02-10T08:30:00Z",actor:"analyst",action:"Issue created — MFA gap identified during quarterly audit."},{timestamp:"2026-02-10T08:40:00Z",actor:"agent",action:"Remediation request email sent to security@acmecloud.com."},{timestamp:"2026-02-13T14:22:00Z",actor:"agent",action:"Vendor reply received. Evidence extracted: 1 PDF attachment."},{timestamp:"2026-02-13T14:23:00Z",actor:"agent",action:"RAG lookup completed for IAM-001. Gemini evaluation initiated."},{timestamp:"2026-02-13T14:24:00Z",actor:"agent",action:"Evaluation complete. Scores: relevance=78, mapping=61, sufficiency=55. Decision: ESCALATE."},{timestamp:"2026-02-13T14:25:00Z",actor:"agent",action:"Issue escalated to human analyst. Notification email sent."}]},
  {issue_id:"ISS-002",vendor_name:"DataVault Inc.",vendor_email:"compliance@datavault.io",control_id:"ENC-003",issue_description:"Encryption at rest is not confirmed for customer data stored in vendor cloud infrastructure. SIG questionnaire response was incomplete for section 7.3.",severity:"High",date_opened:"2026-02-15",sla_deadline:"2026-03-01",status:"Closed",evidence_criteria:"Configuration export or screenshot confirming AES-256 encryption at rest is enabled on all buckets holding customer data.",agent_last_action:"Evidence evaluated — all scores above threshold. Issue auto-closed.",agent_decision:"SUFFICIENT",relevance_score:96,mapping_score:92,sufficiency_score:94,overall_confidence:"HIGH",agent_reasoning:"Vendor provided an AWS S3 console screenshot showing AES-256 encryption enabled on all three customer data buckets, dated February 2026.",missing:null,audit_trail:[{timestamp:"2026-02-15T10:00:00Z",actor:"analyst",action:"Issue created — encryption gap flagged from incomplete SIG response section 7.3."},{timestamp:"2026-02-15T10:10:00Z",actor:"agent",action:"Remediation request email sent to compliance@datavault.io."},{timestamp:"2026-02-18T09:15:00Z",actor:"agent",action:"Vendor reply received. Evidence extracted: 1 PNG screenshot attachment."},{timestamp:"2026-02-18T09:16:00Z",actor:"agent",action:"RAG lookup completed for ENC-003. Gemini evaluation initiated."},{timestamp:"2026-02-18T09:17:00Z",actor:"agent",action:"Evaluation complete. Scores: relevance=96, mapping=92, sufficiency=94. Decision: SUFFICIENT."},{timestamp:"2026-02-18T09:17:00Z",actor:"agent",action:"Issue closed. Vendor notified. Audit log sealed."}]},

  {issue_id:"ISS-004",vendor_name:"SupplyLink Global",vendor_email:"risk@supplylinkglobal.com",control_id:"VUL-005",issue_description:"Vendor has not provided evidence of a formal vulnerability management program including regular scanning and patch cadence within 30 days of critical CVE disclosure.",severity:"Medium",date_opened:"2026-02-22",sla_deadline:"2026-03-08",status:"Under Review",evidence_criteria:"Most recent vulnerability scan report (dated within 60 days) plus documented evidence of patch completion within 30 days for critical CVEs.",agent_last_action:"Vendor reply received. Evidence under evaluation by agent.",agent_decision:null,relevance_score:null,mapping_score:null,sufficiency_score:null,overall_confidence:null,agent_reasoning:null,missing:null,audit_trail:[{timestamp:"2026-02-22T09:00:00Z",actor:"analyst",action:"Issue created — vulnerability management evidence requested."},{timestamp:"2026-02-22T09:10:00Z",actor:"agent",action:"Remediation request email sent to risk@supplylinkglobal.com."},{timestamp:"2026-02-25T16:44:00Z",actor:"agent",action:"Vendor reply received. Evidence extracted: 1 PDF scan report, 1 PNG patch log screenshot."},{timestamp:"2026-02-25T16:45:00Z",actor:"agent",action:"RAG lookup completed for VUL-005. Gemini evaluation in progress."}]},

async function loadIssues(){
  try{const r=await fetch('issues.json?t='+Date.now());const d=await r.json();issues=d.issues;}
  catch(e){issues=EMBEDDED;}
  render();
}

function statusClass(s){return({Open:'open','Awaiting Evidence':'awaiting','Under Review':'review',Closed:'closed',Escalated:'escalated'})[s]||'open';}
function scoreColor(v){if(v===null)return'#3d5578';if(v>=80)return'#06d6a0';if(v>=50)return'#f4a261';return'#ff4d6d';}
function isOverdue(d){return new Date(d)<new Date();}
function fDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function fTS(ts){return new Date(ts).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}

function renderStats(){
  const t=issues.length,op=issues.filter(i=>i.status==='Open').length,aw=issues.filter(i=>i.status==='Awaiting Evidence').length,rv=issues.filter(i=>i.status==='Under Review').length,es=issues.filter(i=>i.status==='Escalated').length,cl=issues.filter(i=>i.status==='Closed').length;
  document.getElementById('stats-row').innerHTML=`<div class="stat-card"><div class="stat-label">Total Issues</div><div class="stat-value accent">${t}</div></div><div class="stat-card"><div class="stat-label">Open</div><div class="stat-value">${op}</div></div><div class="stat-card"><div class="stat-label">Awaiting Evidence</div><div class="stat-value" style="color:#9b72cf">${aw}</div></div><div class="stat-card"><div class="stat-label">Under Review</div><div class="stat-value orange">${rv}</div></div><div class="stat-card"><div class="stat-label">Escalated</div><div class="stat-value red">${es}</div></div><div class="stat-card"><div class="stat-label">Closed</div><div class="stat-value green">${cl}</div></div>`;
}

function getFiltered(){
  return issues.filter(i=>{
    const mf=activeFilter==='All'||i.status===activeFilter;
    const q=searchQuery.toLowerCase();
    const ms=!q||i.vendor_name.toLowerCase().includes(q)||i.issue_description.toLowerCase().includes(q)||i.issue_id.toLowerCase().includes(q);
    return mf&&ms;
  });
}

function renderList(){
  const f=getFiltered();const el=document.getElementById('issue-list');
  if(!f.length){el.innerHTML='<div class="no-issues">No issues match the current filter.</div>';return;}
  el.innerHTML=f.map(i=>`
    <div class="issue-row ${selectedIssueId===i.issue_id?'selected':''}" onclick="selectIssue('${i.issue_id}')">
      <div class="issue-id">${i.issue_id}</div>
      <div class="issue-vendor">${i.vendor_name}</div>
      <div class="issue-desc">${i.issue_description}</div>
      <div><span class="badge badge-${i.severity.toLowerCase()}">${i.severity}</span></div>
      <div><span class="badge badge-${statusClass(i.status)}">${i.status}</span></div>
      <div class="sla-date ${isOverdue(i.sla_deadline)&&i.status!=='Closed'?'overdue':''}">${fDate(i.sla_deadline)}</div>
      <div class="row-actions" onclick="event.stopPropagation()">
        ${i.status!=='Closed'&&i.status!=='Escalated'?`<button class="btn btn-sm btn-danger" onclick="escalateIssue('${i.issue_id}')">Escalate</button>`:''}
        ${i.status==='Escalated'?`<button class="btn btn-sm btn-success" onclick="closeIssue('${i.issue_id}')">Close</button>`:''}
      </div>
    </div>`).join('');
}

function selectIssue(id){
  selectedIssueId=id;const i=issues.find(x=>x.issue_id===id);if(!i)return;renderList();
  document.getElementById('d-id').textContent=i.issue_id;
  document.getElementById('d-vendor').textContent=i.vendor_name;
  document.getElementById('d-control').textContent=`${i.control_id} · ${i.vendor_email}`;
  document.getElementById('d-badges').innerHTML=`<span class="badge badge-${i.severity.toLowerCase()}">${i.severity}</span><span class="badge badge-${statusClass(i.status)}">${i.status}</span>${i.agent_decision?`<span class="badge" style="background:rgba(45,125,210,0.1);color:var(--accent);border:1px solid rgba(45,125,210,0.2)">Agent: ${i.agent_decision}</span>`:''}`;
  const hs=i.relevance_score!==null;
  const scoreSection=hs?`<div class="detail-section"><div class="detail-section-title">Agent Evaluation Scores</div><div class="score-grid">${['relevance_score','mapping_score','sufficiency_score'].map(k=>{const lbl=k.replace('_score','');const v=i[k];const c=scoreColor(v);return`<div class="score-item"><div class="score-label">${lbl.charAt(0).toUpperCase()+lbl.slice(1)}</div><div class="score-value" style="color:${c}">${v}</div><div class="score-bar"><div class="score-fill" style="width:${v}%;background:${c}"></div></div></div>`;}).join('')}</div>${i.overall_confidence?`<div style="margin-top:12px"><div class="detail-field-label">Confidence</div><div class="detail-field-value mono">${i.overall_confidence}</div></div>`:''} ${i.agent_reasoning?`<div style="margin-top:10px"><div class="detail-field-label">Agent Reasoning</div><div class="detail-field-value" style="color:var(--text-muted);font-size:12px;line-height:1.6">${i.agent_reasoning}</div></div>`:''} ${i.missing?`<div style="margin-top:10px;padding:10px 12px;background:var(--high-bg);border:1px solid rgba(255,77,109,0.2);border-radius:6px"><div class="detail-field-label" style="color:var(--high)">Missing Evidence</div><div class="detail-field-value" style="font-size:12px;line-height:1.5">${i.missing}</div></div>`:''}</div>`:'';
  document.getElementById('detail-body').innerHTML=`
    <div class="detail-section"><div class="detail-section-title">Issue Details</div>
      <div class="detail-field"><div class="detail-field-label">Description</div><div class="detail-field-value" style="line-height:1.6">${i.issue_description}</div></div>
      <div class="detail-field"><div class="detail-field-label">Evidence Criteria</div><div class="detail-field-value" style="color:var(--text-muted);font-size:12px;line-height:1.6">${i.evidence_criteria}</div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px">
        <div class="detail-field"><div class="detail-field-label">Date Opened</div><div class="detail-field-value mono">${fDate(i.date_opened)}</div></div>
        <div class="detail-field"><div class="detail-field-label">SLA Deadline</div><div class="detail-field-value mono ${isOverdue(i.sla_deadline)&&i.status!=='Closed'?'overdue':''}">${fDate(i.sla_deadline)}</div></div>
      </div>
      <div class="detail-field"><div class="detail-field-label">Agent Last Action</div><div class="detail-field-value" style="color:var(--text-muted);font-size:12px">${i.agent_last_action||'—'}</div></div>
    </div>
    ${scoreSection}
    <div class="detail-section"><div class="detail-section-title">Audit Trail</div>
      <div class="audit-trail">${[...i.audit_trail].reverse().map(e=>`<div class="audit-item"><div class="audit-dot ${e.actor}"></div><div><div class="audit-action">${e.action}</div><div class="audit-meta">${e.actor.toUpperCase()} · ${fTS(e.timestamp)}</div></div></div>`).join('')}</div>
    </div>`;
  const c=[];
  if(i.status!=='Closed')c.push(`<button class="btn btn-success btn-sm" onclick="closeIssue('${i.issue_id}')">✓ Mark Closed</button>`);
  if(i.status!=='Escalated'&&i.status!=='Closed')c.push(`<button class="btn btn-danger btn-sm" onclick="escalateIssue('${i.issue_id}')">⚡ Escalate</button>`);
  if(i.status==='Closed')c.push(`<button class="btn btn-sm" onclick="reopenIssue('${i.issue_id}')">↩ Reopen</button>`);
  c.push(`<button class="btn btn-sm" style="margin-left:auto" onclick="closeDetail()">Close</button>`);
  document.getElementById('detail-controls').innerHTML=c.join('');
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail(){document.getElementById('detail-panel').classList.remove('open');selectedIssueId=null;renderList();}

function mutate(id,fn,msg){const i=issues.find(x=>x.issue_id===id);if(!i)return;fn(i);showToast(msg);render();if(selectedIssueId===id)selectIssue(id);}

function escalateIssue(id){mutate(id,i=>{i.status='Escalated';i.audit_trail.push({timestamp:new Date().toISOString(),actor:'analyst',action:'Issue manually escalated via dashboard.'});},'Issue escalated.');}
function closeIssue(id){mutate(id,i=>{i.status='Closed';i.audit_trail.push({timestamp:new Date().toISOString(),actor:'analyst',action:'Issue manually closed by analyst override.'});},'Issue closed.');}
function reopenIssue(id){mutate(id,i=>{i.status='Open';i.audit_trail.push({timestamp:new Date().toISOString(),actor:'analyst',action:'Issue reopened. Returned to Open for agent re-processing.'});},'Issue reopened.');}

function openCreateModal(){const s=new Date();s.setDate(s.getDate()+14);document.getElementById('f-sla').value=s.toISOString().split('T')[0];document.getElementById('create-modal').classList.add('open');}
function closeCreateModal(){document.getElementById('create-modal').classList.remove('open');}

function createIssue(){
  const v=document.getElementById('f-vendor').value.trim(),e=document.getElementById('f-email').value.trim(),c=document.getElementById('f-control').value.trim(),d=document.getElementById('f-desc').value.trim(),cr=document.getElementById('f-criteria').value.trim(),sv=document.getElementById('f-severity').value,sl=document.getElementById('f-sla').value;
  if(!v||!e||!c||!d||!cr||!sl){showToast('Please fill in all fields.');return;}
  const nid='ISS-'+String(issues.length+1).padStart(3,'0');
  issues.unshift({issue_id:nid,vendor_name:v,vendor_email:e,control_id:c,issue_description:d,severity:sv,date_opened:new Date().toISOString().split('T')[0],sla_deadline:sl,status:'Open',evidence_criteria:cr,agent_last_action:'Issue created. Pending next agent cycle.',agent_decision:null,relevance_score:null,mapping_score:null,sufficiency_score:null,overall_confidence:null,agent_reasoning:null,missing:null,audit_trail:[{timestamp:new Date().toISOString(),actor:'analyst',action:'Issue created via dashboard. Agent will send remediation email on next cycle.'}]});
  closeCreateModal();showToast(`${nid} created successfully.`);render();selectIssue(nid);
}

function setFilter(f,el){activeFilter=f;document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
function setSearch(v){searchQuery=v;render();}

function showToast(msg){const c=document.getElementById('toast-container');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3000);}

let secs=582;
setInterval(()=>{secs=(secs-1+600)%600;const m=String(Math.floor(secs/60)).padStart(2,'0');const s=String(secs%60).padStart(2,'0');document.getElementById('countdown').textContent=`${m}:${s}`;},1000);

function render(){renderStats();renderList();}
loadIssues();
</script>
</body>
</html>
